<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritwik AI Assistant</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container {
    width:95%;
    max-width:500px;
    height:90vh;
    background:#111;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    overflow:hidden;
    box-shadow:0 0 25px rgba(0,0,0,0.5);
}

header {
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
    background:#1e1e1e;
    color:#00ffcc;
}

#chat {
    flex:1;
    padding:15px;
    overflow-y:auto;
}

.message {
    margin:10px 0;
    padding:10px 15px;
    border-radius:12px;
    max-width:80%;
}

.user {
    background:#00ffcc;
    color:black;
    align-self:flex-end;
}

.bot {
    background:#333;
    color:white;
    align-self:flex-start;
}

.input-area {
    display:flex;
    padding:10px;
    background:#1e1e1e;
}

input {
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    outline:none;
}

button {
    margin-left:10px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#00ffcc;
    cursor:pointer;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
    <header>🤖 Ritwik AI Assistant</header>

    <div id="chat"></div>

    <div class="input-area">
        <input type="text" id="input" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
function sendMessage() {
    const input = document.getElementById("input");
    const text = input.value.trim();
    if (!text) return;

    addMessage(text, "user");
    input.value = "";

    let reply = getBotReply(text);
    setTimeout(() => addMessage(reply, "bot"), 500);
}

function addMessage(text, sender) {
    const chat = document.getElementById("chat");
    const msg = document.createElement("div");
    msg.className = "message " + sender;
    msg.innerText = text;
    chat.appendChild(msg);
    chat.scrollTop = chat.scrollHeight;
}

function getBotReply(text) {
    text = text.toLowerCase();
    if (text.includes("hello")) return "Hello Ritwik 👋 How can I help you?";
    if (text.includes("bye")) return "Goodbye! Have a great day 🚀";
    return "You said: " + text;
}
</script>

</body>
</html>
