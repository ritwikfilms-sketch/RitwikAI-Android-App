<!DOCTYPE html>
<html>
<head>
  <title>Ritwik AI Assistant</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
    }

    .message {
      margin: 8px 0;
      padding: 10px 14px;
      border-radius: 15px;
      max-width: 75%;
      word-wrap: break-word;
    }

    .user {
      background: #3b82f6;
      color: white;
      margin-left: auto;
    }

    .bot {
      background: #1e293b;
      color: white;
      margin-right: auto;
    }

    #inputArea {
      display: flex;
      padding: 10px;
      background: #111827;
    }

    #input {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      margin-left: 8px;
      padding: 10px 15px;
      border-radius: 10px;
      border: none;
      background: #22c55e;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="Type your message..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>

const BASE_URL = "https://ritwikai-backend-production.up.railway.app";

const chat = document.getElementById("chat");

window.onload = function() {
  addMessage("Hello Ritwik 👋 I am your Real AI Assistant 🚀", "bot");
};

async function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  showTyping();

  const reply = await getBotReply(text);

  removeTyping();
  addMessage(reply, "bot");
}

async function getBotReply(message) {
  try {
    const response = await fetch(BASE_URL + "/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: message
      })
    });

    const data = await response.json();
    return data.choices[0].message.content;

  } catch (error) {
    console.error(error);
    return "Server Error 😢";
  }
}

function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.className = "message " + sender;
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const typing = document.createElement("div");
  typing.className = "message bot";
  typing.id = "typing";
  typing.innerText = "Ritwik AI is thinking...";
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;
}

function removeTyping() {
  const typing = document.getElementById("typing");
  if (typing) typing.remove();
}

</script>

</body>
</html>
