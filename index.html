<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritwik AI Assistant</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container {
  width:95%;
  max-width:500px;
  height:90vh;
  background:#111;
  border-radius:15px;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

#chat {
  flex:1;
  padding:15px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
}

.message {
  margin:10px 0;
  padding:10px 15px;
  border-radius:12px;
  max-width:80%;
}

.user {
  background:#00ffcc;
  color:black;
  align-self:flex-end;
}

.bot {
  background:#333;
  color:white;
  align-self:flex-start;
}

#inputArea {
  display:flex;
  padding:10px;
  background:#1e1e1e;
}

#input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
}

button {
  margin-left:10px;
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#22c55e;
  color:white;
  font-weight:bold;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <div id="chat"></div>

  <div id="inputArea">
    <input id="input" placeholder="Type your message..." />
    <button onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
const BASE_URL = "https://ritwikai-backend-production.up.railway.app";
const chat = document.getElementById("chat");

window.onload = function() {
  addMessage("Hello Ritwik 👋 I am your Real AI Assistant 🚀", "bot");
};

async function sendMessage() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  const reply = await getBotReply(text);
  addMessage(reply, "bot");
}

function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.className = "message " + sender;
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

async function getBotReply(message) {
  const response = await fetch(BASE_URL + "/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  });

  const data = await response.json();
  return data.reply || "Error getting reply";
}
</script>

</body>
</html>
