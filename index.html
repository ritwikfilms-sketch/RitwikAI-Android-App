<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ritwik AI</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

header{
    text-align:center;
    padding:15px;
    font-size:22px;
    font-weight:bold;
    background:rgba(0,0,0,0.3);
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:15px;
}

.message{
    margin:10px 0;
    padding:10px 15px;
    border-radius:12px;
    max-width:80%;
}

.user{
    background:#00c6ff;
    align-self:flex-end;
    color:black;
}

.bot{
    background:#1e90ff;
}

#inputArea{
    display:flex;
    padding:10px;
    background:rgba(0,0,0,0.4);
}

input{
    flex:1;
    padding:10px;
    border:none;
    border-radius:8px;
    outline:none;
}

button{
    margin-left:10px;
    padding:10px 15px;
    border:none;
    border-radius:8px;
    background:#00ffcc;
    font-weight:bold;
    cursor:pointer;
}
</style>
</head>

<body>

<header>🤖 Ritwik AI Assistant</header>

<div id="chat"></div>

<div id="inputArea">
<input type="text" id="userInput" placeholder="Type your message...">
<button onclick="sendMessage()">Send</button>
</div>

<script>
function sendMessage(){
    const input = document.getElementById("userInput");
    const text = input.value.trim();
    if(text==="") return;

    addMessage(text,"user");
    input.value="";

    setTimeout(()=>{
        addMessage(generateReply(text),"bot");
    },500);
}

function addMessage(text,type){
    const chat=document.getElementById("chat");
    const msg=document.createElement("div");
    msg.className="message "+type;
    msg.innerText=text;
    chat.appendChild(msg);
    chat.scrollTop=chat.scrollHeight;
}

function generateReply(text){
    text=text.toLowerCase();

    if(text.includes("hello")) return "Hello Ritwik 👋 How can I help you?";
    if(text.includes("who are you")) return "I am Ritwik AI 🤖 Your smart assistant.";
    if(text.includes("bye")) return "Goodbye! Have a great day 🚀";
    
    return "You said: "+text;
}
</script>

</body>
</html>
